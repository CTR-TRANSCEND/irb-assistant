# Apache 2.4+ reverse proxy production configuration for 503c Assistant
# Production deployment configuration
#
# IMPORTANT: Update ServerName to match your actual domain name
# For testing, you can use the server's IP address or a local hostname
# For local testing, use localhost

# Global security settings (must be outside VirtualHost)
ServerTokens Prod
ServerSignature Off

# HTTP to HTTPS redirect
<VirtualHost *:80>
    ServerName localhost
    ServerAdmin admin@localhost

    # Redirect all HTTP traffic to HTTPS
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

    ErrorLog ${APACHE_LOG_DIR}/503c-assistant-redirect-error.log
    CustomLog ${APACHE_LOG_DIR}/503c-assistant-redirect-access.log combined
</VirtualHost>

# HTTPS Virtual Host with reverse proxy
<VirtualHost *:443>
    ServerName localhost
    ServerAdmin admin@localhost

    # SSL Configuration
    SSLEngine on
    # For production, use proper certificates from Let's Encrypt or your CA
    # For testing, generate self-signed certificates:
    #   sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #     -keyout /etc/ssl/private/503c-assistant-selfsigned.key \
    #     -out /etc/ssl/certs/503c-assistant-selfsigned.crt
    SSLCertificateFile /etc/ssl/certs/503c-assistant-selfsigned.crt
    SSLCertificateKeyFile /etc/ssl/private/503c-assistant-selfsigned.key

    # Modern SSL configuration - only allow TLS 1.2 and 1.3
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5:!3DES
    SSLHonorCipherOrder off
    SSLSessionTickets off

    # OCSP Stapling (optional, disable for self-signed certs)
    SSLUseStapling Off

    # Reverse Proxy Configuration
    ProxyRequests Off
    ProxyPreserveHost On
    ProxyAddHeaders On

    # Main application proxy to Laravel (php artisan serve)
    # Note: For production, consider using php-fpm instead of artisan serve
    ProxyPass / http://127.0.0.1:8585/ retry=0 timeout=300
    ProxyPassReverse / http://127.0.0.1:8585/

    # Proxy timeout for long-running requests (file uploads, processing)
    ProxyTimeout 300

    # Request size limit: 1GB (aligned with app's 100MB+ upload capability)
    # Adjust based on actual requirements
    LimitRequestBody 1073741824

    # Limit request fields to prevent DoS
    LimitRequestFields 100
    LimitRequestFieldSize 8190
    LimitRequestLine 8190

    # Forwarded headers for Laravel to detect HTTPS
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Forwarded-Host "localhost"
    RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"

    # Preserve original Host header
    RequestHeader set Host "localhost"

    # Security headers
    IncludeOptional /home/juhur/PROJECTS/project_IRB-assist/503c-assistant/ops/apache/snippets/security-headers.conf

    # Additional headers for proxy
    Header always set X-XSS-Protection "1; mode=block"

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/503c-assistant-error.log
    CustomLog ${APACHE_LOG_DIR}/503c-assistant-access.log combined

    # Log level
    LogLevel warn
</VirtualHost>

# Additional SSL configuration for /etc/apache2/mods-available/ssl.conf
# Ensure these settings are also configured system-wide:
# SSLInsecureRenegotiation off
# SSLStrictSNIVHostCheck on
