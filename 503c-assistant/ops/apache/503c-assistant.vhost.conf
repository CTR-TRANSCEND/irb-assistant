# Apache 2.4+ reverse proxy sample for 503c Assistant.
# Replace hostnames, cert paths, and log paths. Do not commit secrets.

<VirtualHost *:80>
    ServerName irb.example.org

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName irb.example.org

    SSLEngine on
    SSLCertificateFile /path/to/fullchain.pem
    SSLCertificateKeyFile /path/to/privkey.pem

    ProxyRequests Off
    ProxyPreserveHost On
    ProxyAddHeaders On

    # Hard request cap; keep aligned with app policy.
    LimitRequestBody 1073741824

    ProxyPass        / http://127.0.0.1:8000/ retry=0 timeout=60
    ProxyPassReverse / http://127.0.0.1:8000/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    IncludeOptional /absolute/path/to/503c-assistant/ops/apache/snippets/security-headers.conf

    ErrorLog  /path/to/logs/503c-assistant-error.log
    CustomLog /path/to/logs/503c-assistant-access.log combined
</VirtualHost>
